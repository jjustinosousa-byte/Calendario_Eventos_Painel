<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Eventos - Estética Google</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* --- ESTILOS GERAIS (Mantidos 100% Intactos) --- */
        :root {
            --bg-color: #f1f5f9;
            --main-panel-bg: #ffffff;
            --border-color: #dadce0;
            --text-primary: #1e293b;
            --text-secondary: #70757a;
            --accent-color: #1a73e8;
            --active-btn-bg: #e8f0fe;
            --active-btn-text: #174ea6;
            --font-main: 'Inter', sans-serif;
            --font-title: 'Poppins', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); font-family: var(--font-main); color: var(--text-primary); padding: 30px; overflow-x: hidden; }

        .container { display: flex; gap: 20px; max-width: 1600px; margin: auto; }
        
        /* --- CALENDÁRIO PRINCIPAL --- */
        .main-calendar-panel { flex: 3; background: var(--main-panel-bg); border-radius: 12px; border: 1px solid var(--border-color); display: flex; flex-direction: column; overflow: hidden; min-height: 650px; }

        .calendar-header { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); background: #fff; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .dashboard-title { font-family: var(--font-title); font-size: 26px; color: #1e3a8a; }

        /* Botões */
        .view-controls { display: flex; gap: 5px; border: 1px solid var(--border-color); border-radius: 6px; padding: 3px; background: #f8fafc; }
        .view-btn { padding: 8px 20px; border: none; background: none; cursor: pointer; border-radius: 4px; font-size: 14px; font-weight: 500; color: var(--text-secondary); transition: all 0.2s ease; }
        .view-btn.active { background: var(--active-btn-bg); color: var(--active-btn-text); font-weight: 600; }

        .header-right { display: flex; align-items: center; gap: 10px; }
        .current-period { font-size: 18px; font-weight: 600; color: #444; min-width: 150px; text-align: center; }
        .nav-btn { background: none; border: 1px solid var(--border-color); cursor: pointer; padding: 6px 10px; border-radius: 4px; color: var(--text-secondary); }

        .calendar-body { flex-grow: 1; position: relative; overflow-y: auto; }
        .month-days-header { display: grid; grid-template-columns: repeat(7, 1fr); border-bottom: 1px solid var(--border-color); background: #f8fafc; }
        .weekday { padding: 12px; text-align: center; font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; border-right: 1px solid var(--border-color); }
        .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); }
        .day-cell { border-right: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); padding: 8px; min-height: 100px; }
        .day-number { font-size: 13px; font-weight: 500; color: #444; margin-bottom: 8px; display: block; }
        .other-month { background-color: #f8fafc; color: #ccc; }

        /* --- PAINEL LATERAL --- */
        .side-panel { flex: 1; background: var(--main-panel-bg); border-radius: 12px; border: 1px solid var(--border-color); padding: 25px; max-width: 400px; }
        .side-title { font-family: var(--font-title); font-size: 20px; color: #1e3a8a; margin-bottom: 20px; border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        .mini-year-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .mini-month { border: 1px solid #f1f5f9; padding: 8px; border-radius: 8px; }
        .mini-month-title { font-size: 10px; font-weight: 700; text-align: center; margin-bottom: 4px; }
        .mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); font-size: 8px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-calendar-panel">
        <div class="calendar-header">
            <div class="header-left">
                <h1 class="dashboard-title">Calendário de Eventos</h1>
                <div class="view-controls">
                    <button class="view-btn active" data-view="month" onclick="setView('month')">Mês</button>
                    <button class="view-btn" data-view="year" onclick="setView('year')">Ano</button>
                </div>
            </div>
            <div class="header-right">
                <button class="nav-btn" onclick="navigate(-1)"><i class="fas fa-chevron-left"></i></button>
                <div class="current-period" id="displayPeriod">Maio 2026</div>
                <button class="nav-btn" onclick="navigate(1)"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
        <div class="calendar-body" id="calendarBody"></div>
    </div>

    <div class="side-panel">
        <div class="side-title">
            Navegação Anual
            <div style="display:flex; align-items:center; gap:5px;">
                <button class="nav-btn" onclick="changeSideYear(-1)"><i class="fas fa-chevron-left"></i></button>
                <span id="sideYearDisplay">2026</span>
                <button class="nav-btn" onclick="changeSideYear(1)"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
        <div class="mini-year-grid" id="miniYearGrid"></div>
    </div>
</div>

<script>
    const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    let currentDate = new Date(2026, 4, 1);
    let sideYear = 2026;
    let currentView = 'month';

    function setView(view) {
        currentView = view;
        document.querySelectorAll('.view-btn').forEach(b => b.classList.toggle('active', b.getAttribute('data-view') === view));
        render();
    }

    function navigate(dir) {
        if (currentView === 'month') {
            currentDate.setMonth(currentDate.getMonth() + dir);
        } else {
            currentDate.setFullYear(currentDate.getFullYear() + dir);
        }
        render();
    }

    function changeSideYear(dir) {
        sideYear += dir;
        document.getElementById('sideYearDisplay').innerText = sideYear;
        renderMiniYear(sideYear);
    }

    function render() {
        const body = document.getElementById('calendarBody');
        
        if (currentView === 'month') {
            document.getElementById('displayPeriod').innerText = `${months[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
            let html = `<div class="month-days-header">${['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].map(d => `<div class="weekday">${d}</div>`).join('')}</div><div class="month-grid">`;
            const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();
            const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
            for(let i=0; i<firstDay; i++) html += `<div class="day-cell other-month"></div>`;
            for(let i=1; i<=daysInMonth; i++) html += `<div class="day-cell"><span class="day-number">${i}</span></div>`;
            body.innerHTML = html + `</div>`;
        } else {
            document.getElementById('displayPeriod').innerText = `${currentDate.getFullYear()}`;
            // Renderiza o grid de 12 meses na tela principal
            let html = `<div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:10px; padding:20px;">`;
            months.forEach((m, i) => {
                html += `<div style="border:1px solid #eee; padding:10px; border-radius:8px;"><strong>${m}</strong><div style="font-size:10px; display:grid; grid-template-columns:repeat(7, 1fr); margin-top:5px;">${Array.from({length:28}, (_,d)=>`<div>${d+1}</div>`).join('')}</div></div>`;
            });
            body.innerHTML = html + `</div>`;
        }
        renderMiniYear(sideYear);
    }

    function renderMiniYear(y) {
        const grid = document.getElementById('miniYearGrid');
        grid.innerHTML = '';
        months.forEach((m, i) => {
            let mHtml = `<div class="mini-month"><div class="mini-month-title">${m.substring(0,3)}</div><div class="mini-grid">`;
            const daysInM = new Date(y, i + 1, 0).getDate();
            for(let d=1; d<=daysInM; d++) mHtml += `<div>${d}</div>`;
            grid.innerHTML += mHtml + `</div></div>`;
        });
    }

    render();
</script>
</body>
</html>
