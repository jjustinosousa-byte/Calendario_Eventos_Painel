<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Eventos - Estética Google</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* --- ESTILOS GERAIS (Layout e Tema) --- */
        :root {
            --bg-color: #f1f5f9;
            --main-panel-bg: #ffffff;
            --border-color: #dadce0;
            --text-primary: #1e293b;
            --text-secondary: #70757a;
            --accent-color: #1a73e8;
            --active-btn-bg: #e8f0fe;
            --active-btn-text: #174ea6;
            --font-main: 'Inter', sans-serif;
            --font-title: 'Poppins', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-color); font-family: var(--font-main); color: var(--text-primary); padding: 30px; overflow-x: hidden; }

        .container { display: flex; gap: 20px; max-width: 1600px; margin: auto; }
        
        /* --- CALENDÁRIO PRINCIPAL --- */
        .main-calendar-panel {
            flex: 3;
            background: var(--main-panel-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 650px;
        }

        /* Cabeçalho do Calendário */
        .calendar-header {
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .dashboard-title { font-family: var(--font-title); font-size: 26px; color: #1e3a8a; }

        /* Botões de Visualização */
        .view-controls { display: flex; gap: 5px; border: 1px solid var(--border-color); border-radius: 6px; padding: 3px; background: #f8fafc; }
        .view-btn {
            padding: 8px 20px;
            border: none;
            background: none;
            cursor: pointer;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }
        .view-btn:hover { background: #f1f5f9; color: var(--text-primary); }
        .view-btn.active { background: var(--active-btn-bg); color: var(--active-btn-text); font-weight: 600; }

        /* Navegação de Data */
        .header-right { display: flex; align-items: center; gap: 10px; }
        .current-period { font-size: 18px; font-weight: 600; color: #444; min-width: 150px; text-align: center; }
        .nav-btn { background: none; border: 1px solid var(--border-color); cursor: pointer; padding: 6px 10px; border-radius: 4px; color: var(--text-secondary); }
        .nav-btn:hover { background: #f1f5f9; color: var(--text-primary); }

        /* --- CORPO DO CALENDÁRIO (GRID) --- */
        .calendar-body { flex-grow: 1; position: relative; overflow-y: auto; }

        /* Mês View */
        .month-view { display: flex; flex-direction: column; height: 100%; }
        .month-days-header {
            display: grid; grid-template-columns: repeat(7, 1fr);
            border-bottom: 1px solid var(--border-color);
            background: #f8fafc;
        }
        .weekday {
            padding: 12px; text-align: center; font-size: 12px; font-weight: 600;
            color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px;
            border-right: 1px solid var(--border-color);
        }
        .weekday:last-child { border-right: none; }

        .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); flex-grow: 1; }
        .day-cell {
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            padding: 8px; position: relative; min-height: 100px;
        }
        .day-cell:nth-child(7n) { border-right: none; }
        .day-cell.other-month { background-color: #f8fafc; color: #ccc; }
        .day-cell.today { background-color: #fbfdff; }

        .day-number {
            font-size: 13px; font-weight: 500; color: #444; margin-bottom: 8px;
            display: inline-block; width: 28px; height: 28px; text-align: center;
            line-height: 28px; border-radius: 50%;
        }
        .day-cell.today .day-number { background: var(--accent-color); color: #fff; font-weight: 600; }

        /* Clima (Estético, como na imagem) */
        .weather-icon { position: absolute; top: 8px; right: 8px; font-size: 14px; color: #f59e0b; }
        .cloud-icon { color: #cbd5e1; }

        /* Visualização Anual (Placeholder, mas funcional) */
        .other-view-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary); text-align: center; padding: 50px; }
        .other-view-placeholder i { font-size: 60px; color: #cbd5e1; margin-bottom: 20px; }
        .other-view-placeholder h3 { font-family: var(--font-title); font-size: 24px; color: #64748b; margin-bottom: 10px; }

        /* --- PAINEL LATERAL (Mini Calendários) --- */
        .side-panel {
            flex: 1; background: var(--main-panel-bg);
            border-radius: 12px; border: 1px solid var(--border-color);
            padding: 25px; display: flex; flex-direction: column;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); max-width: 400px;
        }
        .side-title { font-family: var(--font-title); font-size: 20px; color: #1e3a8a; margin-bottom: 20px; border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; }

        .mini-year-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .mini-month { border: 1px solid #f1f5f9; padding: 8px; border-radius: 8px; background: #fff; }
        .mini-month-title { font-size: 12px; font-weight: 700; margin-bottom: 5px; color: #333; text-align: center; }
        .mini-days-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; margin-bottom: 3px; }
        .mini-weekday { font-size: 9px; text-align: center; color: var(--text-secondary); font-weight: 600; }
        .mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
        .mini-day { font-size: 10px; text-align: center; height: 18px; line-height: 18px; color: #666; border-radius: 4px; cursor: pointer; }
        .mini-day:hover { background-color: #f1f5f9; }
        .mini-day.today { background: var(--accent-color); color: #fff; font-weight: 600; }

        /* --- UTILITÁRIOS --- */
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-calendar-panel">
        <div class="calendar-header">
            <div class="header-left">
                <h1 class="dashboard-title">Calendário de Eventos</h1>
                <div class="view-controls">
                    <button class="view-btn" data-view="day">Dia</button>
                    <button class="view-btn" data-view="week">Semana</button>
                    <button class="view-btn active" data-view="month">Mês</button>
                    <button class="view-btn" data-view="year">Ano</button>
                </div>
            </div>
            <div class="header-right">
                <button class="nav-btn" id="prevPeriod"><i class="fas fa-chevron-left"></i></button>
                <div class="current-period" id="displayPeriod">Maio 2026</div>
                <button class="nav-btn" id="nextPeriod"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>
        
        <div class="calendar-body" id="calendarBody">
            </div>
    </div>

    <div class="side-panel">
        <h2 class="side-title">Navegação Anual</h2>
        <div class="mini-year-grid" id="miniYearGrid">
            </div>
    </div>
</div>

<script>
    /* --- CONFIGURAÇÕES E ESTADO DA APLICAÇÃO --- */
    const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    const weekdaysShort = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];
    const miniWeekdays = ["D", "S", "T", "Q", "Q", "S", "S"];

    let currentDate = new Date(2026, 4, 1); // Começa em Maio de 2026
    let currentView = 'month';

    /* --- ELEMENTOS DO DOM --- */
    const calendarBody = document.getElementById('calendarBody');
    const displayPeriod = document.getElementById('displayPeriod');
    const viewButtons = document.querySelectorAll('.view-btn');
    const prevBtn = document.getElementById('prevPeriod');
    const nextBtn = document.getElementById('nextPeriod');
    const miniYearGrid = document.getElementById('miniYearGrid');

    /* --- INICIALIZAÇÃO --- */
    function init() {
        renderMiniYear(2026); // Desenha o painel lateral fixo
        renderCalendar();      // Desenha o calendário principal
        setupEventListeners();
    }

    function setupEventListeners() {
        viewButtons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                currentView = e.target.getAttribute('data-view');
                renderCalendar();
            });
        });

        prevBtn.addEventListener('click', () => navigatePeriod(-1));
        nextBtn.addEventListener('click', () => navigatePeriod(1));
    }

    function renderCalendar() {
        updateHeader();
        calendarBody.innerHTML = ''; // Limpa conteúdo anterior

        if (currentView === 'month') {
            renderMonthView();
        } else {
            renderPlaceholderView();
        }
    }

    function updateHeader() {
        viewButtons.forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.querySelector(`[data-view="${currentView}"]`);
        if (activeBtn) activeBtn.classList.add('active');

        if (currentView === 'month') {
            displayPeriod.innerText = `${months[currentDate.getMonth()]} ${currentDate.getFullYear()}`;
        } else {
            displayPeriod.innerText = `${currentDate.getFullYear()}`;
        }
    }

    function navigatePeriod(direction) {
        if (currentView === 'month') {
            currentDate.setMonth(currentDate.getMonth() + direction);
        } else {
            currentDate.setFullYear(currentDate.getFullYear() + direction);
        }
        renderCalendar();
    }

    /* --- RENDERIZAÇÃO DA VISUALIZAÇÃO MÊS (LIMPA) --- */
    function renderMonthView() {
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        
        const firstDayOfMonth = new Date(year, month, 1).getDay(); // Dia da semana do dia 1
        const daysInMonth = new Date(year, month + 1, 0).getDate(); // Total de dias no mês
        const lastDayOfPrevMonth = new Date(year, month, 0).getDate(); // Total de dias do mês anterior

        let html = `
            <div class="month-view">
                <div class="month-days-header">
                    ${weekdaysShort.map(day => `<div class="weekday">${day}</div>`).join('')}
                </div>
                <div class="month-grid">
        `;

        // Dias do mês anterior (padding)
        for (let i = firstDayOfMonth; i > 0; i--) {
            html += `<div class="day-cell other-month"><span class="day-number">${lastDayOfPrevMonth - i + 1}</span></div>`;
        }

        // Dias do mês atual (COMPLETAMENTE LIMPO)
        for (let i = 1; i <= daysInMonth; i++) {
            // Mock de clima estético (como na imagem)
            let weatherHtml = '';
            if (i === 20) weatherHtml = '<i class="fas fa-cloud cloud-icon weather-icon"></i>';
            else if (i === 21 || i === 22) weatherHtml = '<i class="fas fa-sun weather-icon"></i>';
            else if (i === 23) weatherHtml = '<i class="fas fa-cloud cloud-icon weather-icon"></i>';

            html += `
                <div class="day-cell">
                    <span class="day-number">${i}</span>
                    ${weatherHtml}
                </div>
            `;
        }

        // Dias do próximo mês (padding)
        const totalCellsNeeded = 42; 
        const cellsFilled = firstDayOfMonth + daysInMonth;
        for (let i = 1; i <= (totalCellsNeeded - cellsFilled); i++) {
            html += `<div class="day-cell other-month"><span class="day-number">${i}</span></div>`;
        }

        html += `
                </div>
            </div>
        `;
        calendarBody.innerHTML = html;
    }

    /* --- RENDERIZAÇÃO DO PAINEL LATERAL (Mini Anual fixo) --- */
    function renderMiniYear(year) {
        miniYearGrid.innerHTML = ''; 

        for (let m = 0; m < 12; m++) {
            const firstDayOfMonth = new Date(year, m, 1).getDay();
            const daysInMonth = new Date(year, m + 1, 0).getDate();
            
            let html = `
                <div class="mini-month">
                    <div class="mini-month-title">${months[m].substring(0, 3)}</div>
                    <div class="mini-days-header">
                        ${miniWeekdays.map(dw => `<div class="mini-weekday">${dw}</div>`).join('')}
                    </div>
                    <div class="mini-grid">
            `;

            for (let i = 0; i < firstDayOfMonth; i++) html += `<div class="mini-day other-month"></div>`;
            for (let d = 1; d <= daysInMonth; d++) {
                html += `<div class="mini-day" onclick="jumpToDate(${year}, ${m}, ${d})">${d}</div>`;
            }

            html += `</div></div>`;
            miniYearGrid.innerHTML += html;
        }
    }

    /* --- UTILITÁRIOS --- */
    function renderPlaceholderView() {
        calendarBody.innerHTML = `
            <div class="other-view-placeholder">
                <i class="fas fa-table-cells"></i>
                <h3>Visualização de ${currentView === 'day' ? 'Dia' : currentView === 'week' ? 'Semana' : 'Ano'}</h3>
                <p>Nesta visualização, você verá os detalhes estruturais operacionais fiéis ao layout estético solicitado.</p>
            </div>
        `;
    }

    function jumpToDate(y, m, d) {
        currentDate = new Date(y, m, d);
        currentView = 'month'; 
        renderCalendar();
    }

    init();
</script>

</body>
</html>
