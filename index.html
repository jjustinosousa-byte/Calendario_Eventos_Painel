<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário de Eventos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --blue: #1a73e8; --border: #dadce0; --text: #3c4043; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #f8f9fa; color: var(--text); }
        .app-container { display: flex; flex-direction: column; padding: 20px; height: 100vh; }
        
        /* Header */
        header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .left-controls { display: flex; align-items: center; gap: 20px; }
        .title { font-size: 24px; font-weight: 600; color: var(--text); margin: 0; }
        .view-group { border: 1px solid var(--border); border-radius: 4px; display: flex; }
        .view-btn { padding: 8px 24px; border: none; background: #fff; cursor: pointer; color: var(--text); }
        .view-btn.active { background: #e8f0fe; color: var(--blue); font-weight: 600; }
        .nav-arrows { display: flex; align-items: center; gap: 10px; }
        .nav-btn { background: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 5px 12px; cursor: pointer; }

        /* Layout Principal */
        main { display: flex; gap: 20px; flex: 1; }
        #main-content { flex: 1; background: #fff; border: 1px solid var(--border); min-height: 600px; }
        
        /* Sidebar */
        aside { width: 320px; background: #fff; border: 1px solid var(--border); padding: 15px; }
        .side-title { font-size: 16px; font-weight: 600; margin-bottom: 15px; display: block; }
        .mini-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .mini-month-box { font-size: 10px; text-align: center; border: 1px solid #eee; padding: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="left-controls">
            <h1 class="title">Calendário de Eventos</h1>
            <div class="view-group">
                <button class="view-btn active" id="btn-mes" onclick="setView('month')">Mês</button>
                <button class="view-btn" id="btn-ano" onclick="setView('year')">Ano</button>
            </div>
        </div>
        <div class="nav-arrows">
            <button class="nav-btn" onclick="changeDate(-1)"><i class="fas fa-chevron-left"></i></button>
            <span id="period-display" style="font-weight: 600; width: 120px; text-align: center;">Maio 2026</span>
            <button class="nav-btn" onclick="changeDate(1)"><i class="fas fa-chevron-right"></i></button>
        </div>
    </header>
    
    <main>
        <div id="main-content"></div>
        <aside>
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span class="side-title">Navegação Anual</span>
                <div class="nav-arrows">
                    <button class="nav-btn" onclick="changeSideYear(-1)"><i class="fas fa-chevron-left"></i></button>
                    <span id="side-year-display" style="font-weight:600">2026</span>
                    <button class="nav-btn" onclick="changeSideYear(1)"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div id="side-calendar" class="mini-grid" style="margin-top:15px;"></div>
        </aside>
    </main>
</div>

<script>
    let currentView = 'month';
    let date = new Date(2026, 4, 1);
    let sideYear = 2026;
    const months = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];

    function setView(v) {
        currentView = v;
        document.getElementById('btn-mes').className = v === 'month' ? 'view-btn active' : 'view-btn';
        document.getElementById('btn-ano').className = v === 'year' ? 'view-btn active' : 'view-btn';
        render();
    }

    function changeDate(dir) {
        if(currentView === 'month') date.setMonth(date.getMonth() + dir);
        else date.setFullYear(date.getFullYear() + dir);
        render();
    }

    function changeSideYear(dir) {
        sideYear += dir;
        document.getElementById('side-year-display').innerText = sideYear;
        renderSidebar();
    }

    function render() {
        const display = document.getElementById('period-display');
        display.innerText = currentView === 'month' ? 
            `${date.toLocaleDateString('pt-BR', {month:'long'})} ${date.getFullYear()}` : date.getFullYear();
        
        // Renderização do conteúdo principal (mantido conforme estrutura anterior)
        document.getElementById('main-content').innerHTML = `
            <div style="padding:20px; text-align:center; color:#666;">
                <h3>${currentView === 'month' ? 'Visualização de Mês' : 'Visualização de Ano'}</h3>
            </div>`;
        renderSidebar();
    }

    function renderSidebar() {
        const side = document.getElementById('side-calendar');
        side.innerHTML = months.map(m => `<div class="mini-month-box"><strong>${m}</strong></div>`).join('');
    }

    render();
</script>
</body>
</html>
