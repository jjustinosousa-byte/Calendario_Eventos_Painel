<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário Profissional Estilo Google</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --blue: #1a73e8; --border: #dadce0; --text: #3c4043; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: #f8f9fa; color: var(--text); }
        .app-container { display: flex; height: 100vh; flex-direction: column; }
        header { display: flex; align-items: center; justify-content: space-between; padding: 10px 20px; background: #fff; border-bottom: 1px solid var(--border); }
        .controls { display: flex; gap: 10px; align-items: center; }
        .view-btn { padding: 8px 16px; border: 1px solid var(--border); background: #fff; border-radius: 4px; cursor: pointer; }
        .view-btn.active { background: #e8f0fe; color: var(--blue); border-color: var(--blue); font-weight: 600; }
        .nav-arrows { display: flex; align-items: center; gap: 15px; margin-left: 20px; }
        .nav-btn { background: none; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; padding: 5px 10px; }
        main { display: flex; flex: 1; overflow: hidden; }
        #main-content { flex: 1; overflow-y: auto; background: #fff; }
        aside { width: 320px; border-left: 1px solid var(--border); background: #fff; padding: 20px; overflow-y: auto; }
        
        /* Grids */
        .grid-month { display: grid; grid-template-columns: repeat(7, 1fr); height: 100%; }
        .header-day { padding: 10px; font-size: 11px; font-weight: 600; text-align: center; border-bottom: 1px solid var(--border); color: #70757a; }
        .cell { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); min-height: 100px; padding: 5px; }
        .day-num { width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; font-size: 12px; border-radius: 50%; }
        .day-num.today { background: var(--blue); color: #fff; }

        /* Year View */
        .year-grid-main { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 20px; }
        .mini-month { border: 1px solid var(--border); border-radius: 8px; padding: 10px; }
        .mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; font-size: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="controls">
            <h2 style="margin:0; font-size: 22px; color: #1e3a8a;">Painel de Eventos</h2>
            <div style="margin-left:30px">
                <button class="view-btn" onclick="setView('day')">Dia</button>
                <button class="view-btn" onclick="setView('week')">Semana</button>
                <button class="view-btn active" onclick="setView('month')">Mês</button>
                <button class="view-btn" onclick="setView('year')">Ano</button>
            </div>
        </div>
        <div class="nav-arrows">
            <button class="nav-btn" onclick="changeDate(-1)"><i class="fas fa-chevron-left"></i></button>
            <span id="period-display" style="font-weight: 600; font-size: 18px; min-width: 150px; text-align: center;">Maio 2026</span>
            <button class="nav-btn" onclick="changeDate(1)"><i class="fas fa-chevron-right"></i></button>
        </div>
    </header>
    
    <main>
        <div id="main-content"></div>
        <aside id="sidebar">
            <h3 style="font-size: 14px; color: var(--blue);">Navegação Anual</h3>
            <div id="mini-calendar-container"></div>
        </aside>
    </main>
</div>

<script>
    let currentView = 'month';
    let date = new Date(2026, 4, 1);
    const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    const days = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];

    function setView(v) {
        currentView = v;
        document.querySelectorAll('.view-btn').forEach(b => b.classList.remove('active'));
        event.target.classList.add('active');
        render();
    }

    function changeDate(dir) {
        if(currentView === 'day') date.setDate(date.getDate() + dir);
        else if(currentView === 'week') date.setDate(date.getDate() + (dir * 7));
        else if(currentView === 'month') date.setMonth(date.setMonth() + dir); // Simplificado
        else if(currentView === 'year') date.setFullYear(date.getFullYear() + dir);
        render();
    }

    // Função de correção para navegação de mês
    function changeDate(dir) {
        if(currentView === 'day') date.setDate(date.getDate() + dir);
        else if(currentView === 'week') date.setDate(date.getDate() + (dir * 7));
        else if(currentView === 'month') date.setMonth(date.getMonth() + dir);
        else if(currentView === 'year') date.setFullYear(date.getFullYear() + dir);
        render();
    }

    function render() {
        const main = document.getElementById('main-content');
        const display = document.getElementById('period-display');
        main.innerHTML = '';

        if(currentView === 'month') {
            display.innerText = `${months[date.getMonth()]} ${date.getFullYear()}`;
            let html = '<div class="grid-month">';
            days.forEach(d => html += `<div class="header-day">${d}</div>`);
            let first = new Date(date.getFullYear(), date.getMonth(), 1).getDay();
            let count = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            for(let i=0; i<first; i++) html += '<div class="cell" style="background:#f8f9fa"></div>';
            for(let i=1; i<=count; i++) html += `<div class="cell"><div class="day-num">${i}</div></div>`;
            main.innerHTML = html + '</div>';
        } 
        else if(currentView === 'year') {
            display.innerText = date.getFullYear();
            let html = '<div class="year-grid-main">';
            for(let m=0; m<12; m++) {
                html += `<div class="mini-month"><strong>${months[m]}</strong><div class="mini-grid">`;
                for(let d=1; d<=30; d++) html += `<div>${d}</div>`;
                html += '</div></div>';
            }
            main.innerHTML = html + '</div>';
        }
        else if(currentView === 'day') {
            display.innerText = date.toLocaleDateString('pt-BR', {day:'numeric', month:'long'});
            let html = '<div style="padding:20px"><h3>'+days[date.getDay()]+'</h3><hr>';
            for(let i=0; i<24; i++) html += `<div style="height:40px; border-bottom:1px solid #eee; color:#999; font-size:12px">${i}:00</div>`;
            main.innerHTML = html + '</div>';
        }
        else if(currentView === 'week') {
            display.innerText = "Semana " + date.getFullYear();
            let html = '<div style="display:grid; grid-template-columns:repeat(7, 1fr); height:100%">';
            for(let i=0; i<7; i++) html += `<div style="border-right:1px solid #eee; text-align:center; padding:10px"><strong>${days[i]}</strong></div>`;
            main.innerHTML = html + '</div>';
        }

        renderSidebar();
    }

    function renderSidebar() {
        const side = document.getElementById('mini-calendar-container');
        side.innerHTML = `<div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:10px; margin-top:10px">`;
        for(let m=0; m<12; m++) {
            side.innerHTML += `<div style="font-size:10px; text-align:center"><strong>${months[m].substring(0,3)}</strong></div>`;
        }
    }

    render();
</script>
</body>
</html>
