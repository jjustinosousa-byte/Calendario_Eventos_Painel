<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário de Eventos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --blue: #1a73e8; --border: #dadce0; --text: #3c4043; --bg: #f8f9fa; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: var(--text); }
        .app-container { display: flex; height: 100vh; flex-direction: column; padding: 20px; }
        header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 20px; }
        .view-btn { padding: 8px 24px; border: 1px solid var(--border); background: #fff; cursor: pointer; }
        .view-btn.active { background: #e8f0fe; color: var(--blue); border-color: var(--blue); font-weight: 600; }
        .nav-arrows { display: flex; align-items: center; gap: 15px; }
        .nav-btn { background: none; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; padding: 5px 10px; }
        main { display: flex; gap: 20px; flex: 1; }
        #main-content { flex: 1; background: #fff; border: 1px solid var(--border); }
        aside { width: 320px; background: #fff; border: 1px solid var(--border); padding: 20px; }
        
        /* Grid Mensal */
        .grid-month { display: grid; grid-template-columns: repeat(7, 1fr); height: 100%; }
        .header-day { padding: 10px; text-align: center; font-size: 11px; font-weight: 600; border-bottom: 1px solid var(--border); }
        .cell { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); min-height: 100px; padding: 5px; }
        
        /* Grid Anual Principal */
        .year-grid-main { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 20px; }
        .mini-month { border: 1px solid var(--border); padding: 8px; border-radius: 4px; }
        .mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); font-size: 9px; text-align: center; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div>
            <button class="view-btn active" id="btn-mes" onclick="setView('month')">Mês</button>
            <button class="view-btn" id="btn-ano" onclick="setView('year')">Ano</button>
        </div>
        <div class="nav-arrows">
            <button class="nav-btn" onclick="changeDate(-1)"><i class="fas fa-chevron-left"></i></button>
            <span id="period-display" style="font-weight: 600; font-size: 18px; width: 150px; text-align: center;">Maio 2026</span>
            <button class="nav-btn" onclick="changeDate(1)"><i class="fas fa-chevron-right"></i></button>
        </div>
    </header>
    
    <main>
        <div id="main-content"></div>
        <aside>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="font-size: 16px; margin:0;">Navegação Anual</h3>
                <div class="nav-arrows">
                    <button class="nav-btn" onclick="changeSideYear(-1)"><i class="fas fa-chevron-left"></i></button>
                    <span id="side-year-display" style="font-weight:600">2026</span>
                    <button class="nav-btn" onclick="changeSideYear(1)"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div id="side-calendar"></div>
        </aside>
    </main>
</div>

<script>
    let currentView = 'month';
    let date = new Date(2026, 4, 1);
    let sideYear = 2026;
    const months = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
    const days = ["DOM", "SEG", "TER", "QUA", "QUI", "SEX", "SÁB"];

    function setView(v) {
        currentView = v;
        document.getElementById('btn-mes').className = v === 'month' ? 'view-btn active' : 'view-btn';
        document.getElementById('btn-ano').className = v === 'year' ? 'view-btn active' : 'view-btn';
        render();
    }

    function changeDate(dir) {
        if(currentView === 'month') date.setMonth(date.getMonth() + dir);
        else date.setFullYear(date.getFullYear() + dir);
        render();
    }

    function changeSideYear(dir) {
        sideYear += dir;
        document.getElementById('side-year-display').innerText = sideYear;
        renderSidebar();
    }

    function render() {
        const main = document.getElementById('main-content');
        const display = document.getElementById('period-display');
        main.innerHTML = '';

        if(currentView === 'month') {
            display.innerText = `${months[date.getMonth()]} ${date.getFullYear()}`;
            let html = '<div class="grid-month">';
            days.forEach(d => html += `<div class="header-day">${d}</div>`);
            let first = new Date(date.getFullYear(), date.getMonth(), 1).getDay();
            let count = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            for(let i=0; i<first; i++) html += '<div class="cell" style="background:#fcfcfc"></div>';
            for(let i=1; i<=count; i++) html += `<div class="cell">${i}</div>`;
            main.innerHTML = html + '</div>';
        } else {
            display.innerText = date.getFullYear();
            let html = '<div class="year-grid-main">';
            for(let m=0; m<12; m++) {
                html += `<div class="mini-month"><strong>${months[m]}</strong><div class="mini-grid">`;
                for(let d=1; d<=30; d++) html += `<div>${d}</div>`;
                html += '</div></div>';
            }
            main.innerHTML = html + '</div>';
        }
        renderSidebar();
    }

    function renderSidebar() {
        const side = document.getElementById('side-calendar');
        side.innerHTML = `<div style="display:grid; grid-template-columns:repeat(3, 1fr); gap:10px;">` + 
            months.map(m => `<div style="font-size:10px; text-align:center; border:1px solid #eee; padding:5px;"><strong>${m.substring(0,3)}</strong></div>`).join('') + 
            `</div>`;
    }

    render();
</script>
</body>
</html>
